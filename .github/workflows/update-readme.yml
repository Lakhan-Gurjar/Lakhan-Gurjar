name: Update README
on:
  pull_request:
    types: [opened, synchronized, reopened]
  push:
    branches:
      - main
  fork:
  watch:
  schedule:
    - cron: "* * * * *"

jobs:
  build:
    name: Update this repo's README with recent activity
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch recent issues
        id: get_issues
        uses: octokit/request-action@v2.x
        with:
          route: GET /repos/${{ github.repository }}/issues
          state: open
          per_page: 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update README with recent activity
        run: |
          echo "## Recent Activity" > activity.md
          echo "" >> activity.md
          for issue in ${{ steps.get_issues.outputs.data }}
          do
            title=$(echo $issue | jq -r '.title')
            url=$(echo $issue | jq -r '.html_url')
            echo "- [$title]($url)" >> activity.md
          done

          cat activity.md README.md > new_readme.md
          mv new_readme.md README.md

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add README.md
          git commit -m "New activity updated"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
