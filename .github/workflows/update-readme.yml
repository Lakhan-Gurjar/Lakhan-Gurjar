name: Update README
on:
  pull_request:
    types: [opened, synchronized, reopened]
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"

jobs:
  build:
    name: Update this repo's README with recent activity
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch recent issues
        id: get_issues
        uses: octokit/request-action@v2.x
        with:
          route: GET /repos/${{ github.repository }}/issues
          state: open
          per_page: 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update README with recent activity
        run: |
          $issues = '${{ steps.get_issues.outputs.data }}' | ConvertFrom-Json
          $activity = "## Recent Activity`n`n"
          foreach ($issue in $issues) {
            $activity += "- [$($issue.title)]($($issue.html_url))`n"
          }
          $readmeContent = Get-Content README.md -Raw
          $startTag = "<!--START_SECTION:activity-->"
          $endTag = "<!--END_SECTION:activity-->"
          $newReadmeContent = $readmeContent -replace "($startTag.*?$endTag)", "$startTag`n$activity`n$endTag"
          Set-Content -Path README.md -Value $newReadmeContent

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add README.md
          git commit -m "New activity updated"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
